<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style> body { margin: 0; overflow: hidden; } </style>
</head>
<body>
    <div style="position:absolute;top:10px;left:10px;z-index:100;background:#fff;padding:5px;">
        <select id="funcSelector">
            <option value="1">z = x + y</option>
            <option value="2">z = 2*x*log(y)</option>
            <option value="3">Sphere</option>
            <option value="4">Himmelblau</option>
            <option value="5">Rosenbrock</option>
        </select>
        <br>
        <select id="algoSelector">
            <option value="1">TestAlgorithm1</option>
            <option value="2">TestAlgorithm2</option>
            <option value="3">GradientDescent</option>
            <option value="4">Genetic Algorithm (ГА)</option>
        </select>
        <br>
        <div id="algo1Panel">
            Итераций: <input id="maxIter" type="range" min="20" max="300" value="100">
        </div>
        <div id="algo2Panel" style="display:none;">
            X > <input id="xMin" type="number" value="0" step="0.1">
        </div>
        <div id="algo3Panel" style="display: none;">
            <label>Learning rate: <input type="number" step="0.0001" value="0.01" id="lrInput"></label><br>
            <label>Количество траекторий: <input type="number" min="1" max="50" value="10" id="trajCountInput"></label>
        </div>
        <div id="algo4Panel" style="display: none;">
            <label>Размер популяции: <input id="popSize" type="number" value="50" min="10" max="300"></label><br>
            <label>Crossover (pc): <input id="pc" type="number" step="0.05" value="0.85" min="0" max="1"></label><br>
            <label>Mutation (pm): <input id="pm" type="number" step="0.001" value="0.01" min="0" max="0.1"></label>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module" src="UI.js"></script>
</body>
</html>
