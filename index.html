<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style> body { margin: 0; overflow: hidden; } </style>
</head>
<body>
    <div style="position:absolute;top:10px;left:10px;z-index:100;background:#fff;padding:5px;">
        <button id="pauseBtn">Pause</button>
        <button id="restartBtn">Restart</button>
        <br>
        <select id="funcSelector">
            <option value="1">Sphere</option>
            <option value="2">Himmelblau</option>
            <option value="3">Rosenbrock</option>
            <option value="4">ShafferN2</option>
            <option value="5">Styblinski-Tang</option>
            <option value="6">Cross-in-Tray</option>
        </select>
        <br>
        <select id="algoSelector">
            <option value="1">TestAlgorithm1</option>
            <option value="2">TestAlgorithm2</option>
            <option value="3">GradientDescent</option>
            <option value="4">Genetic Algorithm (ГА)</option>
            <option value="5">Particle Swarm Optimization (PSO)</option>
            <option value="6">Bees Algorithm (Пчелиный рой)</option>
        </select>
        <br>
        <div id="algo1Panel">
            Итераций: <input id="maxIter" type="range" min="20" max="300" value="100">
        </div>
        <div id="algo2Panel" style="display:none;">
            X > <input id="xMin" type="number" value="0" step="0.1">
        </div>
        <div id="algo3Panel" style="display: none;">
            <label>Learning rate: <input type="number" step="0.0001" value="0.01" id="lrInput"></label><br>
            <label>Количество траекторий: <input type="number" min="1" max="50" value="10" id="trajCountInput"></label>
        </div>
        <div id="algo4Panel" style="display: none;">
            <label>Размер популяции: <input id="popSize" type="number" value="50" min="10" max="300"></label><br>
            <label>Crossover (pc): <input id="pc" type="number" step="0.05" value="0.85" min="0" max="1"></label><br>
            <label>Mutation (pm): <input id="pm" type="number" step="0.001" value="0.01" min="0" max="0.1"></label>
        </div>
        <div id="algo5Panel" style="display: none;">
            <label>Размер роя: <input id="swarmSize" type="number" value="50" min="10" max="200"></label><br>
            <label>Inertia (ω): <input id="inertia" type="number" step="0.1" value="0.7" min="0" max="1"></label><br>
            <label>Cognitive (φ_p): <input id="cognitive" type="number" step="0.1" value="1.5" min="0" max="3"></label><br>
            <label>Social (φ_g): <input id="social" type="number" step="0.1" value="1.5" min="0" max="3"></label>
        </div>
        <div id="algo6Panel" style="display: none;">
            <label>Пчел-разведчиков: <input id="scouts" type="number" value="20" min="10" max="100"></label><br>
            <label>Элитных участков: <input id="elite" type="number" value="3" min="1" max="10"></label><br>
            <label>Перспективных участков: <input id="best" type="number" value="6" min="2" max="15"></label>
        </div>
        <h3>Current points</h3>
        <pre id="pointsOutput"></pre>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module" src="UI.js"></script>
</body>
</html>
